<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カンペ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
:root { --bg:#0a0a0a; --accent:#ff4444; --ui-bg:rgba(18,18,18,0.96); --ui-border:rgba(255,255,255,0.08); --panel-w:320px; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:#f0f0f0; font-family:'Noto Sans JP',sans-serif; height:100vh; overflow:hidden; user-select:none; }

#display { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:40px 40px 80px; transition:background 0.3s; }
#display-text { width:100%; text-align:center; line-height:1.15; word-break:break-all; font-weight:900; transition:font-size 0.15s ease,color 0.3s; letter-spacing:-0.02em; white-space:pre-wrap; outline:none; cursor:text; caret-color:currentColor; min-height:1em; }
#display-text:empty::before { content:attr(data-placeholder); color:rgba(255,255,255,0.1); font-size:18px; font-weight:400; letter-spacing:0.05em; pointer-events:none; }

/* ── BOTTOM AREA ── */
#bottom-area {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:10; display:flex; align-items:center; gap:8px;
}

/* スロットバー */
#slot-bar {
  display:flex; align-items:center; gap:8px;
  padding:0 14px; height:40px;
  background:rgba(0,0,0,0.45); border-radius:999px;
  backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.08);
}
.slot-dot { width:10px; height:10px; border-radius:50%; border:2px solid rgba(255,255,255,0.35); background:transparent; cursor:pointer; transition:all 0.2s; position:relative; flex-shrink:0; }
.slot-dot:hover { border-color:rgba(255,255,255,0.7); transform:scale(1.2); }
.slot-dot.active { background:#fff; border-color:#fff; }
.slot-dot::after { content:attr(data-name); position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); color:#fff; font-size:11px; padding:3px 8px; border-radius:4px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.15s; font-family:'Noto Sans JP',sans-serif; font-weight:400; }
.slot-dot:hover::after { opacity:1; }
#slot-add { width:22px; height:22px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.25); background:transparent; color:rgba(255,255,255,0.4); font-size:15px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
#slot-add:hover { border-color:rgba(255,255,255,0.7); color:#fff; transform:scale(1.1); }
#slot-add.hidden { display:none; }

/* ── ウィジェットボタン（丸囲み・アイランドなし） ── */
#widget-btns { display:flex; align-items:center; gap:6px; height:40px; }

.bar-widget-btn {
  width:34px; height:34px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.18);
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);
  color:rgba(255,255,255,0.4); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; flex-shrink:0; padding:0;
}
.bar-widget-btn:hover { border-color:rgba(255,255,255,0.55); color:rgba(255,255,255,0.8); }
.bar-widget-btn.on { border-color:rgba(255,255,255,0.7); color:#fff; background:rgba(255,255,255,0.1); }

/* ── タイマー展開バー ── */
#timer-bar {
  display:flex; align-items:center; gap:0;
  height:40px;
  background:rgba(0,0,0,0.45); border-radius:999px;
  backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.08);
  overflow:hidden;
  max-width:0; opacity:0; padding:0;
  transition:max-width 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease, padding 0.4s cubic-bezier(0.4,0,0.2,1);
  white-space:nowrap;
}
#timer-bar.open { max-width:320px; opacity:1; padding:0 10px; }

/* タイマー操作ボタン */
.tbtn {
  width:28px; height:28px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.18);
  background:transparent; color:rgba(255,255,255,0.55);
  font-size:10px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; flex-shrink:0; padding:0;
}
.tbtn:hover { border-color:rgba(255,255,255,0.6); color:#fff; }
.tbtn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

.tbtn-sep { width:1px; height:14px; background:rgba(255,255,255,0.1); flex-shrink:0; margin:0 6px; }

/* ── WIDGETS ── */
#widgets { position:fixed; inset:0; pointer-events:none; z-index:5; }
.widget {
  position:absolute; font-family:'JetBrains Mono',monospace; font-weight:700;
  padding:6px 14px; border-radius:4px;
  background:rgba(0,0,0,0.45); backdrop-filter:blur(4px);
  white-space:nowrap; transition:opacity 0.3s;
}
#clock-widget { top:18px; left:50%; transform:translateX(-50%); font-size:28px; pointer-events:none; }
#timer-widget { top:18px; left:50%; transform:translateX(-50%); font-size:28px; pointer-events:auto; cursor:text; }
  #timer-widget.editing { background:rgba(30,30,30,0.8); outline:none; border-radius:6px; }
.widget.hidden { opacity:0; pointer-events:none !important; }
#timer-widget.timeup { animation:timeup-flash 0.6s ease-in-out infinite alternate; }
@keyframes timeup-flash { from{opacity:1;} to{opacity:0.35;} }

/* フルスクリーンウィジェット時のplaceholder位置 */
#display.widget-fullscreen { align-items:flex-end; padding-bottom:120px; }
#display.widget-fullscreen #display-text:empty::before { font-size:14px; }

/* ── PANEL TOGGLE ── */
#panel-toggle { position:fixed; bottom:22px; right:22px; z-index:200; width:42px; height:42px; border-radius:50%; background:rgba(30,30,30,0.85); border:1px solid var(--ui-border); color:rgba(255,255,255,0.5); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; backdrop-filter:blur(8px); }
#panel-toggle:hover { background:rgba(60,60,60,0.95); color:#fff; transform:scale(1.08); }

/* ── PANEL ── */
#panel { position:fixed; top:0; right:0; width:var(--panel-w); height:100vh; background:var(--ui-bg); border-left:1px solid var(--ui-border); z-index:100; display:flex; flex-direction:column; transform:translateX(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); backdrop-filter:blur(20px); }
#panel.open { transform:translateX(0); }
#panel-header { padding:18px 20px 14px; border-bottom:1px solid var(--ui-border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
#panel-header h2 { font-size:12px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:#555; }
#panel-close { background:none; border:none; color:#555; font-size:20px; cursor:pointer; line-height:1; transition:color 0.2s; }
#panel-close:hover { color:#fff; }
#panel-body { flex:1; overflow-y:auto; padding:14px 20px; scrollbar-width:thin; scrollbar-color:#2a2a2a transparent; }
#panel-body::-webkit-scrollbar { width:3px; }
#panel-body::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:2px; }
.section { margin-bottom:22px; }
.section-title { font-size:10px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:#3a3a3a; margin-bottom:10px; }
.color-row { display:flex; gap:10px; }
.color-item { flex:1; display:flex; flex-direction:column; gap:5px; }
.color-item label { font-size:11px; color:#4a4a4a; }
.color-item input[type=color] { width:100%; height:32px; border:1px solid var(--ui-border); border-radius:5px; background:#111; cursor:pointer; padding:2px; }
.slider-row { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
.slider-row:last-child { margin-bottom:0; }
.slider-row label { font-size:11px; color:#4a4a4a; display:flex; justify-content:space-between; }
input[type=range] { width:100%; accent-color:var(--accent); height:4px; cursor:pointer; }
.font-select { width:100%; padding:7px 10px; background:rgba(255,255,255,0.04); border:1px solid var(--ui-border); border-radius:5px; color:#bbb; outline:none; font-family:inherit; font-size:13px; cursor:pointer; }
.btn-full { width:100%; padding:9px; background:rgba(255,255,255,0.04); border:1px solid var(--ui-border); border-radius:6px; color:#bbb; font-size:13px; cursor:pointer; transition:background 0.2s; font-family:inherit; }
.btn-full:hover { background:rgba(255,255,255,0.09); color:#fff; }
.hint { font-size:11px; color:#2e2e2e; margin-top:6px; line-height:1.6; }
.slot-name-list { display:flex; flex-direction:column; gap:6px; }
.slot-name-row { display:flex; align-items:center; gap:8px; }
.slot-dot-mini { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.2); flex-shrink:0; }
.slot-dot-mini.active { background:#fff; }
.slot-name-input { flex:1; padding:5px 9px; background:rgba(255,255,255,0.04); border:1px solid var(--ui-border); border-radius:5px; color:#ccc; font-size:12px; outline:none; font-family:inherit; transition:border-color 0.2s; }
.slot-name-input:focus { border-color:rgba(255,255,255,0.18); }
.slot-del-btn { background:none; border:none; color:#333; font-size:16px; cursor:pointer; line-height:1; transition:color 0.2s; flex-shrink:0; padding:2px 4px; }
.slot-del-btn:hover { color:var(--accent); }
#copyright { font-size:10px; color:#2a2a2a; font-family:'JetBrains Mono',monospace; text-align:center; padding:16px 0 6px; letter-spacing:0.06em; border-top:1px solid var(--ui-border); margin-top:8px; }


</style>

<body>

<div id="display">
  <div id="display-text" contenteditable="true" spellcheck="false" data-placeholder="クリックしてテキストを入力…"></div>
</div>

<div id="widgets">
  <div class="widget hidden" id="clock-widget">00:00:00</div>
  <div class="widget hidden" id="timer-widget">00:00</div>
</div>

<div id="bottom-area">
  <!-- スロットバー -->
  <div id="slot-bar">
    <button id="slot-add" title="スロットを追加">＋</button>
  </div>

  <!-- ウィジェットボタン（丸囲み・アイランドなし） -->
  <div id="widget-btns">
    <button id="bar-clock-toggle" class="bar-widget-btn" title="時計">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>
    <button id="bar-timer-toggle" class="bar-widget-btn" title="タイマー">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="13" r="8"/>
        <line x1="12" y1="13" x2="12" y2="9"/>
        <line x1="9"  y1="3"  x2="15" y2="3"/>
        <line x1="12" y1="1"  x2="12" y2="3"/>

  <!-- タイマー展開バー -->
  <div id="timer-bar">
    
    <button id="tbtn-start" class="tbtn" title="スタート">▶</button>
    <button id="tbtn-pause" class="tbtn" title="一時停止" style="margin-left:4px">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><rect x="1" y="1" width="3" height="8" rx="1"/><rect x="6" y="1" width="3" height="8" rx="1"/></svg>
    </button>
    <div class="tbtn-sep"></div>
    <button id="tbtn-reset" class="tbtn" title="リセット"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>

</div>

<button id="panel-toggle" title="設定">⚙</button>

<div id="panel">
  <div id="panel-header">

  <div id="panel-body">

    <div class="section">

      <div class="color-row">
        <div class="color-item"><label>背景色</label><input type="color" id="bg-color" value="#0a0a0a"></div>
        <div class="color-item"><label>文字色</label><input type="color" id="text-color" value="#f0f0f0"></div>
        <div class="color-item"><label>ウィジェット</label><input type="color" id="widget-color" value="#ffffff"></div>
      </div>

    <div class="section">
      <div class="section-title">フォント</div>
      <select class="font-select" id="font-select">
        <option value="'Noto Sans JP', sans-serif">Noto Sans JP（デフォルト）</option>
        <option value="'Arial Black', sans-serif">Arial Black</option>

        <label>時計 <span id="clock-size-val">28</span>px</label>
        <input type="range" id="clock-size-range" min="14" max="200" value="28">
      </div>

    <div id="copyright">© 2025 Toshiki Doi</div>

<script>
const MAX_SLOTS = 3;
const state = {
  bgColor:'#0a0a0a', textColor:'#f0f0f0', widgetColor:'#ffffff',
  padding:40, lineHeight:1.15, font:"'Noto Sans JP', sans-serif",
  activeWidget:null,
  clockSize:28, timerSize:28,
  timerRunning:false, timerPaused:false, timerCountdown:false,
  timerTotal:300, timerElapsed:0,
  timerInterval:null, clockInterval:null,
  isTimeUp:false,
  slots:[{name:'カンペ 1',text:''}], activeSlot:0,
};

function el(id){ return document.getElementById(id); }
const $display=el('display'), $displayText=el('display-text'), $panel=el('panel');
const $panelToggle=el('panel-toggle');
const $clockWidget=el('clock-widget'), $timerWidget=el('timer-widget');
const $slotBar=el('slot-bar'), $slotAdd=el('slot-add'), $slotNameList=el('slot-name-list');
const $wSizeSection=el('widget-size-section');
const $clockSizeRow=el('clock-size-row'), $timerSizeRow=el('timer-size-row');
const $barClockBtn=el('bar-clock-toggle'), $barTimerBtn=el('bar-timer-toggle');
const $timerBar=el('timer-bar');
const $tbtnStart=el('tbtn-start'), $tbtnPause=el('tbtn-pause'), $tbtnReset=el('tbtn-reset');
// ── STORAGE ──
function persist(){ try{localStorage.setItem('kanpe-slots',JSON.stringify(state.slots));localStorage.setItem('kanpe-active',state.activeSlot);}catch(e){} }
function hydrate(){ try{const s=localStorage.getItem('kanpe-slots');const a=localStorage.getItem('kanpe-active');if(s)state.slots=JSON.parse(s);if(a!==null)state.activeSlot=Math.min(parseInt(a),state.slots.length-1);}catch(e){} }

// ── TEXT ──
function getDisplayText(){
  let text='';
  const walk=(node)=>{
    if(node.nodeType===3){text+=node.textContent;}
    else if(node.nodeType===1){
      const tag=node.tagName.toLowerCase();
      if(tag==='br'){text+='\n';return;}
      const isBlock=['div','p','li'].includes(tag);
      if(isBlock&&text.length>0&&!text.endsWith('\n'))text+='\n';
      node.childNodes.forEach(walk);
      if(isBlock&&!text.endsWith('\n'))text+='\n';
    }
  };
  $displayText.childNodes.forEach(walk);
  return text.replace(/\n$/,'');
}
function setDisplayText(text){
  $displayText.innerHTML='';
  if(!text)return;
  text.split('\n').forEach((line,i)=>{
    if(i>0)$displayText.appendChild(document.createElement('br'));
    if(line)$displayText.appendChild(document.createTextNode(line));
  });
}

// ── FONT SIZE ──
function calcFontSize(){
  const text=getDisplayText(); if(!text.trim())return;
  const W=window.innerWidth-state.padding*2, H=window.innerHeight-state.padding*2-60;
  const lines=text.split('\n');
  const canvas=calcFontSize._c||(calcFontSize._c=document.createElement('canvas'));
  const ctx=canvas.getContext('2d');
  let lo=8,hi=800,best=16;
  while(lo<=hi){const mid=(lo+hi)>>1;if(Math.max(...lines.map(l=>l.length||0.5))*mid*0.58<=W&&lines.length*mid*state.lineHeight<=H){best=mid;lo=mid+1;}else hi=mid-1;}
  let fs=best;
  for(let s=best+10;s>=4;s--){ctx.font=`900 ${s}px ${state.font}`;if(Math.max(...lines.map(l=>ctx.measureText(l).width))<=W&&lines.length*s*state.lineHeight<=H){fs=s;break;}}
  $displayText.style.fontSize=fs+'px';
}

// ── WIDGET SIZE ──
function measureWidget(text,maxW,maxH){
  const canvas=measureWidget._c||(measureWidget._c=document.createElement('canvas'));
  const ctx=canvas.getContext('2d');
  let lo=8,hi=600,best=40;
  while(lo<=hi){const mid=(lo+hi)>>1;ctx.font=`700 ${mid}px 'JetBrains Mono',monospace`;if(ctx.measureText(text).width<=maxW-80&&mid*1.2<=maxH){best=mid;lo=mid+1;}else hi=mid-1;}
  return best;
}

function updateWidgetSizes(){
  const isEmpty=getDisplayText().trim()==='';
  const W=window.innerWidth, H=window.innerHeight;
  const aw=state.activeWidget;

  // プレースホルダー位置の制御
  const widgetFullscreen = isEmpty && aw !== null;
  $display.classList.toggle('widget-fullscreen', widgetFullscreen);

  const applyFull=(elem,size)=>{
    elem.style.cssText='';
    Object.assign(elem.style,{
      top:'50%',left:'50%',right:'auto',
      transform:'translate(-50%,-50%)',
      background:'none',backdropFilter:'none',
      padding:'0',borderRadius:'0',
      color:state.widgetColor,fontSize:size+'px',whiteSpace:'nowrap'
    });
  };
  const applyNormal=(elem,size)=>{
    elem.style.cssText='';
    Object.assign(elem.style,{top:'18px',left:'50%',transform:'translateX(-50%)',fontSize:size+'px',color:state.widgetColor});
  };

  if(aw==='clock'){
    if(isEmpty){ applyFull($clockWidget, measureWidget($clockWidget.textContent||'00:00:00',W,H*0.55)); }
    else { applyNormal($clockWidget,state.clockSize); }
  } else if(aw==='timer'){
    const label=state.isTimeUp?'TIME UP':($timerWidget.textContent||'00:00');
    if(isEmpty){ applyFull($timerWidget, measureWidget(label,W,H*0.55)); }
    else { applyNormal($timerWidget,state.timerSize); }
  }
}

// ── RENDER ──
function render(){
  $display.style.background=state.bgColor;
  $displayText.style.color=state.textColor;
  $displayText.style.fontFamily=state.font;
  $displayText.style.lineHeight=state.lineHeight;
  $display.style.padding=state.activeWidget&&getDisplayText().trim()===''
    ? `${state.padding}px ${state.padding}px 120px`
    : `${state.padding}px ${state.padding}px 80px`;
  $clockWidget.style.color=state.widgetColor;
  if(!state.isTimeUp) $timerWidget.style.color=state.widgetColor;
  calcFontSize(); updateWidgetSizes();
}

// ── WIDGET TOGGLE ──
function updateWidgetUI(){
  const cOn=state.activeWidget==='clock', tOn=state.activeWidget==='timer';
  $barClockBtn.classList.toggle('on',cOn);
  $barTimerBtn.classList.toggle('on',tOn);
  $clockWidget.classList.toggle('hidden',!cOn);
  $timerWidget.classList.toggle('hidden',!tOn);
  $timerBar.classList.toggle('open',tOn);
  $wSizeSection.style.display=(cOn||tOn)?'block':'none';
  $clockSizeRow.style.display=cOn?'flex':'none';
  $timerSizeRow.style.display=tOn?'flex':'none';
}
function activateClock(){
  if(state.activeWidget==='clock'){ deactivateAll(); return; }
  if(state.activeWidget==='timer') stopTimerInterval();
  state.activeWidget='clock';
  updateWidgetUI(); startClock(); render();
}
function activateTimer(){
  if(state.activeWidget==='timer'){ deactivateAll(); return; }
  if(state.activeWidget==='clock') stopClock();
  state.activeWidget='timer';
  state.isTimeUp=false;
  $timerWidget.classList.remove('timeup');
  updateTimerDisplay();
  updateWidgetUI(); render();
}
function deactivateAll(){
  if(state.activeWidget==='clock') stopClock();
  if(state.activeWidget==='timer') stopTimerInterval();
  state.activeWidget=null; state.isTimeUp=false;
  $timerWidget.classList.remove('timeup');
  updateWidgetUI(); render();
}

$barClockBtn.addEventListener('click',e=>{ e.stopPropagation(); activateClock(); });
$barTimerBtn.addEventListener('click',e=>{ e.stopPropagation(); activateTimer(); });

// ── CLOCK ──
function startClock(){
  if(state.clockInterval)clearInterval(state.clockInterval);
  const tick=()=>{ const n=new Date(); $clockWidget.textContent=[String(n.getHours()),String(n.getMinutes()).padStart(2,'0'),String(n.getSeconds()).padStart(2,'0')].join(':'); updateWidgetSizes(); };
  tick(); state.clockInterval=setInterval(tick,1000);
}
function stopClock(){ clearInterval(state.clockInterval); state.clockInterval=null; }

// ── TIMER ──
const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

function updateTimerDisplay(){
  if(state.isTimeUp) return;
  const rem=state.timerCountdown ? Math.max(0,state.timerTotal-state.timerElapsed) : state.timerElapsed;
  $timerWidget.textContent=fmt(rem);
  $timerWidget.style.color=(state.timerCountdown&&rem<=10&&rem>0)?'#ff4444':state.widgetColor;
}

function startTimer(){
  if(state.timerInterval||state.isTimeUp) return;
  if(!state.timerRunning && !state.timerPaused){
    state.timerElapsed=0;
    state.timerCountdown=state.timerTotal>0;
  }
  state.timerRunning=true;
  state.timerPaused=false;
  state.timerInterval=setInterval(()=>{
    state.timerElapsed++;
    if(state.timerCountdown){
      const rem=Math.max(0,state.timerTotal-state.timerElapsed);
      if(rem===0){
        clearInterval(state.timerInterval); state.timerInterval=null; state.timerRunning=false;
        state.isTimeUp=true;
        $timerWidget.textContent='TIME UP';
        $timerWidget.style.color=state.widgetColor;
        $timerWidget.classList.add('timeup');
        $tbtnStart.classList.remove('active');
      } else {
        $timerWidget.textContent=fmt(rem);
        $timerWidget.style.color=rem<=10?'#ff4444':state.widgetColor;
      }
    } else {
      $timerWidget.textContent=fmt(state.timerElapsed);
    }
    updateWidgetSizes();
  },1000);
  $tbtnStart.classList.add('active');
  $tbtnPause.classList.remove('active');
}

function pauseTimer(){
  clearInterval(state.timerInterval); state.timerInterval=null; state.timerRunning=false; state.timerPaused=true;
  $tbtnStart.classList.remove('active'); $tbtnPause.classList.add('active');
}

function resetTimer(){
  clearInterval(state.timerInterval); state.timerInterval=null;
  state.timerRunning=false; state.timerElapsed=0;
  state.isTimeUp=false;
  $timerWidget.classList.remove('timeup');
  
  state.timerCountdown=state.timerTotal>0;
  updateTimerDisplay();
  $tbtnStart.classList.remove('active'); $tbtnPause.classList.remove('active');
  updateWidgetSizes();
}

function stopTimerInterval(){ clearInterval(state.timerInterval); state.timerInterval=null; state.timerRunning=false; }

$tbtnStart.addEventListener('click',e=>{ e.stopPropagation(); startTimer(); });
$tbtnPause.addEventListener('click',e=>{ e.stopPropagation(); pauseTimer(); });
$tbtnReset.addEventListener('click',e=>{ e.stopPropagation(); resetTimer(); });


// ── SLOTS ──
function renderDots(){
  $slotBar.querySelectorAll('.slot-dot').forEach(d=>d.remove());
  state.slots.forEach((slot,i)=>{
    const dot=document.createElement('div');
    dot.className='slot-dot'+(i===state.activeSlot?' active':'');
    dot.setAttribute('data-name',slot.name);
    dot.addEventListener('click',()=>switchSlot(i));
    $slotBar.insertBefore(dot,$slotAdd);
  });
  $slotAdd.classList.toggle('hidden',state.slots.length>=MAX_SLOTS);
  renderSlotNameList();
}
function switchSlot(i){
  if(i===state.activeSlot)return;
  state.slots[state.activeSlot].text=getDisplayText();
  state.activeSlot=i; setDisplayText(state.slots[i].text);
  persist(); renderDots(); render();
}
function addSlot(){
  if(state.slots.length>=MAX_SLOTS)return;
  state.slots[state.activeSlot].text=getDisplayText();
  state.slots.push({name:`カンペ ${state.slots.length+1}`,text:''});
  state.activeSlot=state.slots.length-1;
  setDisplayText(''); persist(); renderDots(); render(); $displayText.focus();
}
function renderSlotNameList(){
  $slotNameList.innerHTML='';
  state.slots.forEach((slot,i)=>{
    const row=document.createElement('div'); row.className='slot-name-row';
    const dot=document.createElement('div'); dot.className='slot-dot-mini'+(i===state.activeSlot?' active':'');
    const input=document.createElement('input'); input.className='slot-name-input'; input.type='text'; input.value=slot.name;
    input.addEventListener('input',e=>{ state.slots[i].name=e.target.value||`カンペ ${i+1}`; const dots=$slotBar.querySelectorAll('.slot-dot'); if(dots[i])dots[i].setAttribute('data-name',state.slots[i].name); persist(); });
    const del=document.createElement('button'); del.className='slot-del-btn'; del.textContent='×'; del.style.display=state.slots.length<=1?'none':'';
    del.addEventListener('click',e=>{ e.stopPropagation(); e.preventDefault(); if(state.slots.length<=1)return; state.slots.splice(i,1); state.activeSlot=Math.min(state.activeSlot,state.slots.length-1); setDisplayText(state.slots[state.activeSlot].text); persist(); renderDots(); render(); });
    row.appendChild(dot); row.appendChild(input); row.appendChild(del);
    $slotNameList.appendChild(row);
  });
}

// ── PANEL ──
const closePanel=()=>$panel.classList.remove('open');
$panelToggle.addEventListener('click',e=>{ e.stopPropagation(); $panel.classList.toggle('open'); });
el('panel-close').addEventListener('click',closePanel);
document.addEventListener('contextmenu',e=>{ if(!$panel.contains(e.target)&&e.target!==$panelToggle){ e.preventDefault(); $panel.classList.add('open'); }});
document.addEventListener('click',e=>{ if($panel.classList.contains('open')&&!$panel.contains(e.target)&&e.target!==$panelToggle) closePanel(); });

// ── DISPLAY INPUT ──
$displayText.addEventListener('input',()=>{ state.slots[state.activeSlot].text=getDisplayText(); persist(); render(); });
$displayText.addEventListener('paste',e=>{ e.preventDefault(); document.execCommand('insertText',false,e.clipboardData.getData('text/plain')); });
$display.addEventListener('mousedown',e=>{ if(e.target!==$display)return; e.preventDefault(); $displayText.focus(); const r=document.createRange(); r.selectNodeContents($displayText); r.collapse(false); const s=window.getSelection(); s.removeAllRanges(); s.addRange(r); });

// ── SETTINGS ──
el('bg-color').addEventListener('input',e=>{ state.bgColor=e.target.value; render(); });
el('text-color').addEventListener('input',e=>{ state.textColor=e.target.value; render(); });
el('widget-color').addEventListener('input',e=>{ state.widgetColor=e.target.value; render(); });
el('font-select').addEventListener('change',e=>{ state.font=e.target.value; render(); });
el('padding-range').addEventListener('input',e=>{ state.padding=parseInt(e.target.value); el('padding-val').textContent=state.padding; render(); });
el('lineheight-range').addEventListener('input',e=>{ state.lineHeight=parseInt(e.target.value)/100; el('lineheight-val').textContent=state.lineHeight.toFixed(2); render(); });
el('clock-size-range').addEventListener('input',e=>{ state.clockSize=parseInt(e.target.value); el('clock-size-val').textContent=state.clockSize; render(); });
el('timer-size-range').addEventListener('input',e=>{ state.timerSize=parseInt(e.target.value); el('timer-size-val').textContent=state.timerSize; render(); });

$slotAdd.addEventListener('click',e=>{ e.stopPropagation(); addSlot(); });
el('fullscreen-btn').addEventListener('click',()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen().catch(()=>{}); closePanel(); });

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  const inEditor=document.activeElement===$displayText;
  const inInput=['INPUT','SELECT'].includes(document.activeElement?.tagName);
  if(e.key==='F11'){ e.preventDefault(); if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen().catch(()=>{}); }
  if(e.key==='Escape'){ if($panel.classList.contains('open')){ closePanel(); return; } if(inEditor){ $displayText.blur(); return; } }
  if(!inEditor&&!inInput){
    if(e.key===' '){ e.preventDefault(); state.timerRunning?pauseTimer():startTimer(); }
    if(e.key==='r'||e.key==='R'){ if(state.activeWidget==='timer') resetTimer(); }
    if(e.key==='Tab'){ e.preventDefault(); $panel.classList.toggle('open'); }
    const num=parseInt(e.key); if(num>=1&&num<=MAX_SLOTS&&num<=state.slots.length) switchSlot(num-1);
  }
});

let _rt;
window.addEventListener('resize',()=>{ clearTimeout(_rt); _rt=setTimeout(render,80); });

// ── INIT ──
hydrate();
setDisplayText(state.slots[state.activeSlot].text);
renderDots(); updateWidgetUI(); updateTimerDisplay(); render();
$displayText.focus();



// タイマークリック編集
document.getElementById('timer-widget').addEventListener('click', e => {
  if(state.activeWidget !== 'timer') return;
  e.stopPropagation();
  if(state.timerRunning) return;
  if(state.isTimeUp){ resetTimer(); return; }
  const tw = document.getElementById('timer-widget');
  tw.contentEditable = 'true';
  tw.classList.add('editing');
  // select all
  const range = document.createRange();
  range.selectNodeContents(tw);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
});
document.getElementById('timer-widget').addEventListener('blur', () => {
  const tw = document.getElementById('timer-widget');
  tw.contentEditable = 'false';
  tw.classList.remove('editing');
  const raw = tw.textContent.trim();
  let total = 0;
  if(raw.includes(':')) {
    // MM:SS format
    const parts = raw.split(':').map(p => parseInt(p) || 0);
    total = parts[0]*60 + (parts[1]||0);
  } else {
    // numeric only: treat as seconds
    // 5→5s, 30→30s, 100→1m0s, 500→5m0s, 550→5m50s
    const n = parseInt(raw) || 0;
    const mins = Math.floor(n / 100);
    const secs = n % 100;
    total = mins * 60 + Math.min(secs, 59);
  }
  state.timerTotal = Math.max(0, Math.min(5999, total));
  state.timerElapsed = 0;
  state.timerCountdown = state.timerTotal > 0;
  updateTimerDisplay();
  updateWidgetSizes();
});
document.getElementById('timer-widget').addEventListener('keydown', e => {
  if(e.key === 'Enter'){ e.preventDefault(); document.getElementById('timer-widget').blur(); }
  if(e.key === 'Escape'){ document.getElementById('timer-widget').contentEditable='false'; document.getElementById('timer-widget').classList.remove('editing'); updateTimerDisplay(); }
  e.stopPropagation();
});

</script>
